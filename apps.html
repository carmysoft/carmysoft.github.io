<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uygulamalar</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  text-align:center;
  margin-top:40px;
}

.card{
  background:#222;
  margin:20px auto;
  padding:20px;
  width:250px;
  border-radius:10px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
}

button{
  padding:8px 15px;
  border:none;
  background:white;
  color:black;
  border-radius:6px;
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:12px;
  width:300px;
  text-align:center;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.close{
  float:right;
  cursor:pointer;
  font-weight:bold;
}

a{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:black;
  color:white;
  text-decoration:none;
  border-radius:6px;
}
</style>

</head>

<body>

<div class="topbar">
  <div>CarmySoft</div>
</div>

<div class="container">
  <h2>Uygulamalar</h2>

  <div class="card">
    <h3>File Manager</h3>
    <button onclick="openPopup()">Aç</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="popup">
    <span class="close" onclick="closePopup()">X</span>

    <h2>File Manager</h2>
    <p>Hızlı ve sade dosya yöneticisi</p>

    <a href="https://drive.google.com/file/d/1C8ZPTZQk1Ng86YSoOwGT8MBWpswAL8Zb/view?usp=drive_link">
      İndir
    </a>
  </div>
</div>

<script>
function openPopup(){
  document.getElementById("overlay").style.display = "flex";
}

function closePopup(){
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
