<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarmySoft</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #1f2937, #000);
  color:white;
}

.topbar{
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.hero{
  text-align:center;
  padding:70px 20px;
  max-width:800px;
  margin:auto;
}

.hero p{
  color:#d1d5db;
  line-height:1.6;
}

.btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 25px;
  background:white;
  color:black;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:40px;
  gap:15px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:220px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
}

footer{
  text-align:center;
  margin-top:60px;
  font-size:12px;
  color:#9ca3af;
}
</style>

</head>

<body>

<div class="topbar">CarmySoft</div>

<div class="hero">
  <h1>Hoş Geldiniz</h1>

  <p>
    Carmysoft olarak bağımsız yazılım projeleri yapıyoruz.
    Sizin desteğiniz bizim için önemli.
  </p>

  <a class="btn" href="apps.html">Uygulamaları Keşfet</a>

  <div class="cards">
    <div class="card">⚡ Hızlı yazılımlar</div>
    <div class="card">📦 Yeni projeler</div>
    <div class="card">💡 Sürekli geliştirme</div>
  </div>
</div>

<footer>© 2026 CarmySoft</footer>

</body>
</html>
